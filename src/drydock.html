<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050b0f" />
    <title>Ganymede — Drydock</title>
    <style>
      :root {
        --panel: #0d131dee;
        --line: #1c2634;
        --ink: #cfdbe8;
        --muted: #5f7189;
        --accent: #97ce4c;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #04060b;
        color: var(--ink);
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      .hud {
        position: fixed;
        top: 0.8rem;
        left: 0.8rem;
        display: flex;
        flex-direction: column;
        gap: 0.7rem;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0.9rem;
        max-width: 250px;
      }
      .hud h1 {
        font-size: 0.72rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        margin: 0;
        font-weight: 600;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
      }
      button {
        font: inherit;
        font-size: 0.72rem;
        cursor: pointer;
        border: 1px solid var(--line);
        background: transparent;
        color: var(--muted);
        border-radius: 4px;
        padding: 0.35rem 0.55rem;
      }
      button:hover {
        border-color: var(--muted);
        color: var(--ink);
      }
      button.on {
        border-color: var(--accent);
        color: var(--accent);
        background: #97ce4c14;
      }
      button:focus-visible,
      input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .swatch {
        width: 1.7rem;
        height: 1.7rem;
        padding: 0;
      }
      .swatch.on {
        outline: 2px solid var(--ink);
        outline-offset: 2px;
      }
      label {
        display: flex;
        justify-content: space-between;
        font-size: 0.68rem;
        color: var(--muted);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      label output {
        color: var(--accent);
        font-variant-numeric: tabular-nums;
      }
      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }
      .gear {
        font-size: 0.7rem;
        color: var(--muted);
        line-height: 1.55;
        border-top: 1px solid var(--line);
        padding-top: 0.6rem;
        margin: 0;
      }
      .gear b {
        color: var(--ink);
      }
      .err {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .editor {
        left: auto;
        right: 0.8rem;
        width: 300px;
        max-width: calc(100vw - 1.6rem);
        max-height: calc(100vh - 1.6rem);
        overflow-y: auto;
      }
      .editor h2 {
        font-size: 0.66rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
        margin: 0.3rem 0 0;
        font-weight: 600;
      }
      .editor .ctl {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.1rem;
      }
      select {
        font: inherit;
        font-size: 0.72rem;
        background: transparent;
        color: var(--ink);
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 0.25rem;
      }
      select option {
        background: #0d131d;
      }
      .check {
        display: flex;
        gap: 0.4rem;
        align-items: center;
        font-size: 0.72rem;
        color: var(--muted);
      }
      .part-btn.on {
        border-color: var(--accent);
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <canvas id="gpu-canvas"></canvas>
    <div class="hud" id="hud">
      <h1>Drydock — hull concept</h1>
      <div class="row" id="classRow"></div>
      <div class="row" id="teamRow"></div>
      <div>
        <label>tilt <output id="tiltOut">28°</output></label>
        <input id="tilt" type="range" min="0" max="60" value="28" />
      </div>
      <div class="row">
        <button type="button" id="spin">spin</button>
        <button type="button" id="bank">bank sweep</button>
        <button type="button" id="mono">mono tint</button>
        <button type="button" id="pause">pause</button>
        <button type="button" id="design">design</button>
      </div>
      <p class="gear">drag hull to orbit — x yaw · y pitch</p>
      <p class="gear" id="gear"></p>
    </div>
    <div class="hud editor" id="editor" hidden>
      <h1>hull designer — <span id="edCls"></span></h1>
      <div class="row" id="partList"></div>
      <div class="row">
        <button type="button" id="addPart">+ part</button>
        <button type="button" id="dupPart">duplicate</button>
        <button type="button" id="delPart">delete</button>
      </div>
      <div id="partCtl"></div>
      <h2>engines</h2>
      <div id="engCtl"></div>
      <div class="row"><button type="button" id="addEng">+ engine</button></div>
      <div class="row">
        <button type="button" id="exportTs">export → clipboard</button>
        <button type="button" id="resetCls">reset class</button>
      </div>
    </div>
    <script type="module" src="./drydock.ts"></script>
  </body>
</html>
