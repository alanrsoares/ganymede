<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#050b0f" />
    <link rel="icon" href="data:," />
    <title>Ganymede — Drydock</title>
    <!-- Astryx design system: shared reset + component styles (same foundation
         the game loads via styles.css), then the gothic tokens wrapper. -->
    <link rel="stylesheet" href="./astryx.css" />
    <link rel="stylesheet" href="./astryx-theme.css" />
    <style>
      /* Only the chrome astryx can't own: the fullscreen canvas and the
         floating panel overlay. Everything inside the panels is astryx.
         Accent stays portal green — brand override on top of the gothic
         tokens, picked up by every astryx selection state. */
      :root,
      [data-astryx-theme] {
        --color-accent: oklch(0.7873 0.1695 129.2); /* portal green */
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #04060b;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      .panel {
        position: fixed;
        top: 0.8rem;
        width: 300px;
        max-width: calc(100vw - 1.6rem);
        max-height: calc(100vh - 1.6rem);
        overflow-y: auto;
        overscroll-behavior: contain;
        padding: 1rem;
        border: 1px solid var(--color-border, #1c2634);
        border-radius: 8px;
        background: color-mix(
          in srgb,
          var(--color-background-surface, #101314) 93%,
          transparent
        );
      }
      .panel-left {
        left: 0.8rem;
      }
      .panel-right {
        right: 0.8rem;
        width: 340px;
      }
      /* Team tint swatches — color chips have no astryx counterpart. */
      .swatch-row {
        display: flex;
        gap: 0.3rem;
      }
      .swatch {
        width: 1.7rem;
        height: 1.7rem;
        padding: 0;
        border: 1px solid var(--color-border, #1c2634);
        border-radius: 4px;
        cursor: pointer;
      }
      .swatch.on {
        outline: 2px solid var(--color-text-primary, #cfdbe8);
        outline-offset: 2px;
      }
      .toggle-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
      }
      .num-entry {
        width: 5.5rem;
        flex: none;
      }
      .err {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.9rem;
        color: var(--color-text-secondary, #5f7189);
      }
    </style>
  </head>
  <body>
    <canvas id="gpu-canvas"></canvas>
    <div id="ui-root"></div>
    <script type="module" src="./drydock/main.tsx"></script>
  </body>
</html>
