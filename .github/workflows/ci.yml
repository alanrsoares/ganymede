name: CI

# Lint + typecheck + build on every PR and on pushes to main, so the deploy
# workflow only ever runs against code that has already passed checks.
on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun test
      - run: bun run build
